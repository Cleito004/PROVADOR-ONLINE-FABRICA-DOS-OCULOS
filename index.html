<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Provador Virtual - Fábrica dos Óculos</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="loading-overlay" class="hidden">
      <div class="loader">
        <div class="spinner"></div>
        <p id="loading-text">Carregando modelo de detecção facial...</p>
      </div>
    </div>

    <div id="error-overlay" class="hidden">
      <div class="error-box">
        <span class="error-icon">&#x26A0;&#xFE0F;</span>
        <h2 id="error-title">Algo deu errado</h2>
        <p id="error-message">Não foi possível carregar o modelo de detecção facial.</p>

      </div>
    </div>

    <div id="scan-overlay" class="hidden">
      <div class="scan-box">
        <div class="scan-ring"></div>
        <div class="scan-content">
          <span class="scan-icon">&#x1F9D0;</span>
          <h2 id="scan-title">Escaneando Rosto</h2>
          <p id="scan-message">Fique parado por um instante enquanto escaneamos seu rosto...</p>
          <div class="scan-progress">
            <div id="scan-progress-bar" class="scan-progress-bar"></div>
          </div>
          <p id="scan-status" class="scan-status">Detectando...</p>
        </div>
      </div>
    </div>

    <main>
      <div id="viewer">
        <div id="threejs-container"></div>
        <video id="webcam" autoplay playsinline muted></video>
        <div id="face-info"></div>

        <!-- Matriz 3x1 de estilos - centro direito -->
        <div id="style-matrix">
          <div class="style-item active" data-style="square">
            <span class="style-icon">&#x1F453;</span>
            <span class="style-name">Quadrado</span>
          </div>
          <div class="style-item" data-style="aviator">
            <span class="style-icon">&#x1F453;</span>
            <span class="style-name">Aviador</span>
          </div>
          <div class="style-item" data-style="cateye">
            <span class="style-icon">&#x1F453;</span>
            <span class="style-name">Gatinho</span>
          </div>
        </div>

        <!-- Faixa de cores RGB - base inferior -->
        <div id="color-strip-container">
          <div id="color-strip">
            <div id="color-needle"></div>
          </div>
        </div>

        <!-- Sliders de ajuste manual -->
        <div id="adjustment-panel">
          <div class="adj-row">
            <label>Distância</label>
            <input type="range" id="adj-distance" min="-300" max="300" value="-150" step="10">
            <span id="adj-distance-value" class="adj-value">-150</span>
          </div>
        </div>

        <!-- Status de detecção de mão -->
        <div id="hand-gesture-status"></div>
      </div>
    </main>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="script.js"></script>
</body>
</html>
